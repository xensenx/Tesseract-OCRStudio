<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance | Tesseract OCR Studio</title>
  <style>
    :root {
      --bg: #09090b;
      --fg: #e4e4e7;
      --accent: #f59e0b; /* Amber */
      --accent-glow: rgba(245, 158, 11, 0.2);
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      color: var(--fg);
      font-family: "Space Mono", monospace, sans-serif;
      overflow: hidden;
      position: relative;
    }
    .grid-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent-glow);
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .illustration {
      margin-bottom: 2rem;
    }
    .illustration svg {
      width: 120px;
      height: 120px;
      color: var(--accent);
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }
    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 0 0 1rem 0;
      letter-spacing: -0.05em;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #a1a1aa;
      margin: 0 0 2rem 0;
    }
    .badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(245, 158, 11, 0.1);
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: var(--accent);
      color: #000;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: background-color 0.2s, transform 0.2s;
    }
    .btn:hover {
      background-color: #fbbf24;
      transform: translateY(-2px);
    }
    .btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="container">
    <div class="illustration">
      <!-- Crossed screwdriver and wrench icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.492-3.053c.206-.252.42-.511.605-.783a3.5 3.5 0 00-4.088-5.263M11.42 15.17c-1.396 1.396-3.812 1.947-5.857 1.488-1.74-.39-3.32-1.378-4.434-2.735a3.535 3.535 0 011.66-5.594c1.246-.464 2.66-.54 3.96-.282.68.134 1.332.39 1.928.742l3.414 3.414M12.5 12.5l2.492-3.053c.206-.252.42-.511.605-.783a3.5 3.5 0 00-4.088-5.263l-2.029 2.029L5.342 3.25A2.652 2.652 0 001.59 7.002l2.181 2.181-2.029 2.029a3.5 3.5 0 005.263 4.088c.272-.185.531-.4.783-.605l3.053-2.492" />
      </svg>
    </div>

    <h1>Site Under Maintenance</h1>
    <p>
      We are currently tuning up our OCR engines and making infrastructure improvements.
      Tesseract OCR Studio is under maintenance and will be back up and running smoothly in a few days.
    </p>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
      <div class="badge">Site Offline</div>
      <a href="https://github.com/xensenx/Tesseract-OCRStudio" target="_blank" rel="noopener noreferrer" class="btn">

    </div>
  </div>
</body>
</html>
