<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance | Tesseract OCR Studio</title>
  <style>
    :root {
      --bg: #09090b;
      --fg: #e4e4e7;
      --accent: #f59e0b; /* Amber */
      --accent-glow: rgba(245, 158, 11, 0.2);
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      color: var(--fg);
      font-family: "Space Mono", monospace, sans-serif;
      overflow: hidden;
      position: relative;
    }
    .grid-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent-glow);
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .illustration {
      margin-bottom: 2rem;
    }
    .illustration img, .illustration svg {
      width: 120px;
      height: 120px;
      color: var(--accent);
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }
    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 0 0 1rem 0;
      letter-spacing: -0.05em;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #a1a1aa;
      margin: 0 0 2rem 0;
    }
    .badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(245, 158, 11, 0.1);
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: var(--accent);
      color: #000;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: background-color 0.2s, transform 0.2s;
    }
    .btn:hover {
      background-color: #fbbf24;
      transform: translateY(-2px);
    }
    .btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="container">
    <div class="illustration">
      <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" fill="currentColor" class="bi bi-wrench" viewBox="0 0 16 16">
        <path d="M.102 2.223A3.004 3.004 0 0 0 3.78 5.897l6.341 6.252A3.003 3.003 0 0 0 13 16a3 3 0 1 0-.851-5.878L5.897 3.781A3.004 3.004 0 0 0 2.223.1l2.141 2.142L4 4l-1.757.364zm13.37 9.019.528.026.287.445.445.287.026.529L15 13l-.242.471-.026.529-.445.287-.287.445-.529.026L13 15l-.471-.242-.529-.026-.287-.445-.445-.287-.026-.529L11 13l.242-.471.026-.529.445-.287.287-.445.529-.026L13 11z"/>
      </svg>
    </div>

    <h1>Site Under Maintenance</h1>
    <p>
      We are currently tuning up our OCR engines and making infrastructure improvements.
      Tesseract OCR Studio is under maintenance and will be back up and running smoothly in a few days.
    </p>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
      <div class="badge">Site Offline</div>
      <a href="https://github.com/xensenx/Tesseract-OCRStudio" target="_blank" rel="noopener noreferrer" class="btn">

        View Source Code

    </div>
  </div>
</body>
</html>
